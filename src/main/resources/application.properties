spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}

# Azure Blob Storage
azure.storage.enabled=true
azure.storage.connection-string=${AZURE_STORAGE_CONNECTION_STRING:}
azure.storage.container-name=files

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/clouddrive}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA + Flyway
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# API + file uploads
server.port=${SERVER_PORT:8081}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT
jwt.secret=${JWT_SECRET:CloudDriveLocalSecretKeyChangeMe_AtLeast32Chars}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
