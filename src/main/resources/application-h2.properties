# H2 Database (Development Profile)
spring.datasource.url=jdbc:h2:mem:clouddrive;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional - accessible at http://localhost:8081/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA + Flyway
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# Azure Blob Storage — leave empty for local dev (file upload will return 503 until configured)
azure.storage.connection-string=
azure.storage.container-name=files


# API + file uploads
server.port=${SERVER_PORT:8081}
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT
jwt.secret=${JWT_SECRET:CloudDriveLocalSecretKeyChangeMe_AtLeast32Chars}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

